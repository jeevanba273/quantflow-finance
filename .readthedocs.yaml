# Read the Docs configuration. See:
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# HTML only for now. PDF (LaTeX) can choke on the Unicode math in the
# docstrings/theory page; it can be re-enabled later with latex_engine="xelatex".
formats: []
